<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link | Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="menu-wrapper">
        <button class="menu-trigger" onclick="toggleMenu()">
            <div class="dot"></div>
            <div class="dot"></div>
        </button>
        <nav id="side-menu" class="glass-menu">
            <ul>
                <li><a href="#">Strona Główna</a></li>
                <li><a href="https://github.com/TwojUser" target="_blank">Kod źródłowy</a></li>
                <li><a href="mailto:kontakt@example.com">Zgłoś błąd</a></li>
            </ul>
        </nav>
    </div>

   <main id="app" class="scene">
    <div class="cards-wrapper">
        <div id="card-profile" class="glass-container active-card">
            <div class="avatar-wrapper">
                <img id="user-avatar" src="" alt="Avatar">
            </div>
            <h1 id="user-name">Ładowanie...</h1>
            <p class="status-tag">@Online</p>
        </div>

        <div id="card-bio" class="glass-container hidden-card">
            <h2>O mnie</h2>
            <p id="user-bio" class="bio-text"></p>
        </div>

        <div id="card-media" class="glass-container hidden-card">
            <h2>Social Media</h2>
            <div id="links-container" class="links-stack"></div>
        </div>
    </div>

    <nav class="side-dock">
        <button class="dock-item" onclick="switchCard('profile')" title="Profil">👤</button>
        <button class="dock-item" onclick="switchCard('bio')" title="Opis">📄</button>
        <button class="dock-item" onclick="switchCard('media')" title="Media">🔗</button>
    </nav>
</main>

    <script src="script.js"></script>
</body>
</html>
